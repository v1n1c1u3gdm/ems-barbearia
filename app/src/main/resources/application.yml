spring:
  application:
    name: ems-barbearia
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mariadb://localhost:3306/ems_barbearia}
    username: ${SPRING_DATASOURCE_USERNAME:app}
    password: ${SPRING_DATASOURCE_PASSWORD:app_secret}
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /docs.html
    url: /v3/api-docs

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: when_authorized

app:
  jwt:
    public-secret: ${JWT_PUBLIC_SECRET:default-public-secret-change-in-production}
    public-expiration-ms: ${JWT_PUBLIC_EXPIRATION_MS:86400000}
  public-auth:
    frontend-url: ${PUBLIC_AUTH_FRONTEND_URL:http://localhost:5173}
    backend-base-url: ${PUBLIC_AUTH_BACKEND_BASE_URL:http://localhost:8080/api}
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
      client-secret: ${GOOGLE_CLIENT_SECRET:}
    apple:
      client-id: ${APPLE_CLIENT_ID:}
      team-id: ${APPLE_TEAM_ID:}
      key-id: ${APPLE_KEY_ID:}
      private-key: ${APPLE_PRIVATE_KEY:}
