services:
  mariadb:
    image: mariadb:10.11
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-changeme}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-ems_barbearia}
      MARIADB_USER: ${MARIADB_USER:-app}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-app_secret}
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:mariadb://mariadb:3306/${MARIADB_DATABASE:-ems_barbearia}
      SPRING_DATASOURCE_USERNAME: ${MARIADB_USER:-app}
      SPRING_DATASOURCE_PASSWORD: ${MARIADB_PASSWORD:-app_secret}
      JAVA_TOOL_OPTIONS: "-Dliquibase.secureParsing=false"
    expose:
      - "8080"
    depends_on:
      mariadb:
        condition: service_healthy

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    expose:
      - "80"

  proxy:
    image: nginx:alpine
    ports:
      - "80:80"
      # - "443:443"  # descomente ao ativar HTTPS em nginx/nginx.conf
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
      - ui

volumes:
  mariadb_data:
